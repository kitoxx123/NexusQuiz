<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusQuiz - Yönetim Paneli</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1f2833;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1, h2 { color: #66fcf1; }
        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #45f3ff22;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #45f3ff;
            background: #0b0c10;
            color: white;
            box-sizing: border-box;
        }
        button {
            background: #66fcf1;
            color: #0b0c10;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #45f3ff; }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .radio-group label { display: inline; font-weight: normal; }
        .radio-group input { width: auto; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ NexusQuiz Yönetim Paneli</h1>
    <p>Sitenizi buradan gerçek zamanlı olarak güncelleyin.</p>
    
    <hr style="border-color: #45f3ff; margin: 20px 0;">

    <div class="section">
        <h2>1. Site Görünüm Ayarları</h2>
        
        <label for="siteName">Sol Üstteki Site İsmi (Logo):</label>
        <input type="text" id="siteName" value="NexusQuiz">
        
        <label>Arka Plan Motifi Seçin:</label>
        <div class="radio-group">
            <label><input type="radio" name="bgMotif" value="plain"> Düz Renk</label>
            <label><input type="radio" name="bgMotif" value="grid" checked> Siber Izgara (Grid)</label>
            <label><input type="radio" name="bgMotif" value="dots"> Modern Noktalı</label>
        </div>

        <label for="bgColor">Arka Plan Rengi:</label>
        <input type="color" id="bgColor" value="#0b0c10" style="height: 40px; padding: 0;">

        <button onclick="ayarlariKaydet()">Görünümü Güncelle</button>
    </div>

    <div class="section">
        <h2>2. Kolay Soru Ekleme</h2>
        
        <label for="kategori">Hangi Kategoriye Eklensin?</label>
        <select id="kategori">
            <option value="oyun">Oyun Kültürü</option>
            <option value="bilim">Bilim ve Mühendislik</option>
            <option value="arabalar">Otomobil ve Hız</option>
            <option value="kediler">Felinoloji (Kediler)</option>
            <option value="muzik">Ağır Metal</option>
        </select>

        <label for="soruMetni">Soru Cümlesi:</label>
        <input type="text" id="soruMetni" placeholder="Örn: CS2'de bombanın patlama süresi kaç saniyedir?">

        <label>Şıklar (Seçenekler):</label>
        <input type="text" id="sikA" placeholder="A Şıkkı">
        <input type="text" id="sikB" placeholder="B Şıkkı">
        <input type="text" id="sikC" placeholder="C Şıkkı">
        <input type="text" id="sikD" placeholder="D Şıkkı">

        <label for="dogruCevap">Doğru Cevap Hangisi?</label>
        <select id="dogruCevap">
            <option value="0">A Şıkkı</option>
            <option value="1">B Şıkkı</option>
            <option value="2">C Şıkkı</option>
            <option value="3">D Şıkkı</option>
        </select>

        <button onclick="soruEkle()">Soruyu Sisteme Yükle</button>
    </div>
</div>

<script>
    // Sayfa açıldığında sunucudaki mevcut ayarları çekip form alanlarına doldurur
    window.onload = function() {
        fetch('/api/ayarlar')
            .then(res => res.json())
            .then(data => {
                document.getElementById('siteName').value = data.isim;
                document.getElementById('bgColor').value = data.renk;
                const motifRadio = document.querySelector(`input[name="bgMotif"][value="${data.motif}"]`);
                if(motifRadio) motifRadio.checked = true;
            });
    };

    function ayarlariKaydet() {
        const isim = document.getElementById('siteName').value;
        const motif = document.querySelector('input[name="bgMotif"]:checked').value;
        const renk = document.getElementById('bgColor').value;
        
        fetch('/api/ayarlar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isim, motif, renk })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
        })
        .catch(err => alert("Bir hata oluştu!"));
    }

    function soruEkle() {
        const kategori = document.getElementById('kategori').value;
        const text = document.getElementById('soruMetni').value;
        const a = document.getElementById('sikA').value;
        const b = document.getElementById('sikB').value;
        const c = document.getElementById('sikC').value;
        const d = document.getElementById('sikD').value;
        const correct = document.getElementById('dogruCevap').value;

        if(!text || !a || !b || !c || !d) {
            alert('Lütfen tüm alanları doldurun!');
            return;
        }

        fetch('/api/soru-ekle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                kategori,
                text,
                options: [a, b, c, d],
                correct
            })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            // Formu temizle
            document.getElementById('soruMetni').value = "";
            document.getElementById('sikA').value = "";
            document.getElementById('sikB').value = "";
            document.getElementById('sikC').value = "";
            document.getElementById('sikD').value = "";
        })
        .catch(err => alert("Soru eklenirken hata oluştu!"));
    }
</script>
</body>
</html>
