<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusQuiz</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.5s;
        }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .container {
            background-color: #1f2833;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #45f3ff44;
            position: relative;
        }
        
        h1, h2, h3 { color: #66fcf1; margin-top: 0; }
        
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #45f3ff88;
            border-radius: 8px;
            background-color: #0b0c10;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }
        input:focus { border-color: #66fcf1; box-shadow: 0 0 10px #45f3ff44; }
        
        .btn {
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { background-color: #45f3ff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(69, 243, 255, 0.4); }
        .btn-danger { background-color: #ff4655; color: white; margin-top: 15px; }
        .btn-danger:hover { background-color: #ff5a68; box-shadow: 0 5px 15px rgba(255, 70, 85, 0.4); }
        .btn-secondary { background-color: #1f2833; color: #66fcf1; border: 1px solid #66fcf1; margin-top: 15px; }
        .btn-secondary:hover { background-color: #66fcf1; color: #0b0c10; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; width: 100%; max-width: 700px; }
        .card { background: #0b0c10; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #45f3ff44; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #45f3ff; color: #0b0c10; border-color: #66fcf1; transform: translateY(-5px); }
        .card h3 { margin-bottom: 5px; transition: 0.3s; }
        .card:hover h3 { color: #0b0c10; }

        .screen { display: none; width: 100%; max-width: 700px; }
        .active { display: block; }
        
        .code-box { 
            font-size: 36px; font-weight: 900; color: #66fcf1; background-color: #0b0c10; 
            padding: 15px 30px; border-radius: 8px; margin: 20px auto; display: inline-flex; 
            align-items: center; justify-content: center; letter-spacing: 5px; border: 2px dashed #45f3ff;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .code-box:hover { background-color: #45f3ff22; }
        .code-box::after {
            content: "Kopyala"; position: absolute; font-size: 12px; top: -12px; background: #66fcf1; color: #0b0c10;
            padding: 2px 8px; border-radius: 4px; letter-spacing: normal; font-weight: bold; opacity: 0; transition: 0.3s;
        }
        .code-box:hover::after { opacity: 1; top: -15px; }

        .player-list { list-style: none; padding: 0; margin: 20px 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .player-list li { background-color: #0b0c10; padding: 12px; border-radius: 6px; border: 1px solid #45f3ff66; font-weight: 600; font-size: 15px; }
        
        .question-box { font-size: 22px; margin-bottom: 30px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: 600; line-height: 1.4; padding: 10px;}
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .option-btn { background-color: #0b0c10; color: #ffffff; border: 2px solid #45f3ff66; padding: 20px; font-size: 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s; text-align: center; font-weight: 600; }
        .option-btn:hover:not(:disabled) { background-color: #45f3ff; color: #0b0c10; border-color: #66fcf1; transform: scale(1.03); }
        .option-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .timer-bar-container { width: 100%; height: 8px; background-color: #0b0c10; border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4655, #66fcf1); transition: width 0.1s linear; }
        
        #waiting-msg { display: none; color: #66fcf1; font-style: italic; margin-bottom: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .score-list { list-style: none; padding: 0; margin: 25px 0; }
        .score-list li { background-color: #0b0c10; padding: 15px 20px; margin-bottom: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #45f3ff; font-size: 18px; transition: 0.3s; }
        .score-list li.winner { border-left: 5px solid #ffd700; background: linear-gradient(90deg, rgba(255,215,0,0.1) 0%, transparent 100%); border-radius: 8px; transform: scale(1.02); }
        .score-val { color: #66fcf1; font-weight: 900; }
        .winner .score-val { color: #ffd700; }
        
    </style>
</head>
<body>

    <div id="login-screen" class="container screen active fade-in">
        <h1 id="siteLogo">NexusQuiz</h1>
        <p style="color: #c5c6c7; margin-bottom: 25px;">Savaşa katılmak için ajan ismini belirle:</p>
        <input type="text" id="username-input" placeholder="Örn: Ghost, Kratos..." autocomplete="off">
        <button class="btn" onclick="showCategories()">Sisteme Giriş Yap</button>
    </div>

    <div id="category-screen" class="screen fade-in">
        <h2 style="text-align: center;">Kategori Seç ve Odanı Kur</h2>
        <div class="grid-container" id="kategoriListesi"></div>
        <button class="btn btn-secondary" style="max-width: 300px; margin: 30px auto; display: block;" onclick="anaSayfayaDon()">⬅ İsmimi Değiştir</button>
    </div>

    <div id="lobby-screen" class="container screen fade-in">
        <h1 id="lobby-title">Bekleme Lobisi</h1>
        <p style="color:#c5c6c7;">Arkadaşlarına göndermek için koda tıkla:</p>
        <div class="code-box" id="room-code-display" onclick="koduKopyala()" title="Kopyalamak için tıkla">----</div>
        <h3 style="margin-top: 10px;">Bağlanan Oyuncular</h3>
        <ul class="player-list" id="players-ul"></ul>
        <button class="btn" id="start-game-btn" onclick="startGame()">Savaşı Başlat 🚀</button>
        <button class="btn btn-danger" onclick="anaSayfayaDon()">Odadan Çık / İptal Et</button>
    </div>

    <div id="game-screen" class="container screen fade-in" style="max-width: 700px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 id="question-number" style="margin:0;">Soru: 1</h3>
        </div>
        <div class="timer-bar-container">
            <div class="timer-bar" id="timer-bar"></div>
        </div>
        <div class="question-box" id="question-text">Soru yükleniyor...</div>
        <div id="waiting-msg">Cevabın iletildi, diğer oyuncular bekleniyor...</div>
        <div class="options-grid">
            <button class="option-btn" onclick="submitAnswer(0)" id="opt-0">A</button>
            <button class="option-btn" onclick="submitAnswer(1)" id="opt-1">B</button>
            <button class="option-btn" onclick="submitAnswer(2)" id="opt-2">C</button>
            <button class="option-btn" onclick="submitAnswer(3)" id="opt-3">D</button>
        </div>
    </div>

    <div id="score-screen" class="container screen fade-in">
        <h1 id="score-title">🏆 Mevcut Durum</h1>
        <ul class="score-list" id="scores-ul"></ul>
        <button class="btn" id="next-question-btn" onclick="nextQuestion()">Sonraki Soruya Geç ➔</button>
        <button class="btn btn-secondary" id="return-home-btn" style="display: none;" onclick="anaSayfayaDon()">Ana Sayfaya Dön</button>
    </div>

    <script>
        // --- SİBER SES MOTORU (%100 TELİFSİZ KOD) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                // Menü tıklama - Hızlı ve tok bir dijital bip
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(500, now + 0.05);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'select') {
                // Şık seçimi - Tiz ve mekanik bir kilitlenme sesi
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.linearRampToValueAtTime(400, now + 0.1);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'start') {
                // Soru Başlangıcı / Oyun Başlangıcı - Çift nota uyarısı
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(660, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'finish') {
                // Oyun Bitişi - Uzun zafer sinyali
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.2);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.4);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.15, now + 0.2);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        // --- OYUN MANTIĞI ---
        const socket = io();
        let benimKullaniciAdim = "";
        let currentRoomCode = "";
        let maxDuration = 150;
        let hasAnswered = false;

        document.getElementById("username-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); showCategories(); }
        });

        function ayarlariveKategorileriYukle() {
            fetch('/api/ayarlar').then(res => res.json()).then(data => {
                document.body.style.backgroundColor = data.renk;
                document.getElementById('siteLogo').innerText = data.isim;
                const liste = document.getElementById('kategoriListesi');
                liste.innerHTML = "";
                data.kategoriler.forEach(k => {
                    liste.innerHTML += `
                        <div class="card" onclick="odaOlustur('${k.id}')">
                            <h3>${k.name}</h3>
                            <p style="color: #66fcf1; margin-bottom:0; font-size:14px; font-weight:bold;">Oda Kur ➔</p>
                        </div>`;
                });
            });
        }

        function showCategories() {
            const input = document.getElementById('username-input').value.trim();
            if(input.length < 2) return alert("Lütfen en az 2 karakterli bir isim girin!");
            playSound('click');
            benimKullaniciAdim = input;
            switchScreen('category-screen');
            ayarlariveKategorileriYukle();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function anaSayfayaDon() {
            playSound('click');
            setTimeout(() => { window.location.reload(); }, 100);
        }

        function koduKopyala() {
            playSound('click');
            navigator.clipboard.writeText(currentRoomCode).then(() => {
                alert("Oda kodu kopyalandı: " + currentRoomCode);
            });
        }

        function odaOlustur(kategoriId) {
            playSound('click');
            socket.emit('oda-olustur', { username: benimKullaniciAdim, secilenTest: kategoriId });
        }

        socket.on('oda-olusturuldu', (data) => {
            currentRoomCode = data.odaKodu;
            document.getElementById('room-code-display').innerText = data.odaKodu;
            document.getElementById('lobby-title').innerText = data.testAdi.toUpperCase() + " Odası";
            switchScreen('lobby-screen');
            updatePlayerList(data.oyuncular);
        });

        socket.on('oyuncu-listesi', (oyuncular) => { updatePlayerList(oyuncular); });

        function updatePlayerList(players) {
            const ul = document.getElementById('players-ul');
            ul.innerHTML = "";
            players.forEach(p => { ul.innerHTML += `<li>${p.name}</li>`; });
        }

        function startGame() {
            playSound('start');
            socket.emit('oyunu-baslat', currentRoomCode);
        }

        socket.on('yeni-soru', (data) => {
            hasAnswered = false;
            maxDuration = data.sure * 10;
            document.getElementById('waiting-msg').style.display = 'none';
            switchScreen('game-screen');
            playSound('start');
            
            document.getElementById('question-number').innerText = `Soru: ${data.soruNo}`;
            document.getElementById('question-text').innerText = data.soru.text;
            
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`opt-${i}`);
                btn.innerText = data.soru.options[i];
                btn.style.backgroundColor = '#0b0c10';
                btn.style.borderColor = '#45f3ff66';
                btn.disabled = false;
            }
        });

        socket.on('sure-guncelle', (kalanSure) => {
            const pct = (kalanSure / maxDuration) * 100;
            document.getElementById('timer-bar').style.width = pct + '%';
        });

        function submitAnswer(index) {
            if(hasAnswered) return;
            hasAnswered = true;
            playSound('select'); // Kilitlenme Sesi
            
            const currentWidthPct = parseFloat(document.getElementById('timer-bar').style.width) || 0;
            const progressRatio = currentWidthPct / 100;
            
            for(let i=0; i<4; i++) { document.getElementById(`opt-${i}`).disabled = true; }
            document.getElementById(`opt-${index}`).style.backgroundColor = '#1f2833';
            document.getElementById(`opt-${index}`).style.borderColor = '#66fcf1';
            document.getElementById('waiting-msg').style.display = 'block';
            
            socket.emit('cevap-ver', { odaKodu: currentRoomCode, secilenIndex: index, gecenSureOrani: progressRatio });
        }

        socket.on('skor-guncelle', (oyuncular) => {
            switchScreen('score-screen');
            const ul = document.getElementById('scores-ul');
            ul.innerHTML = "";
            oyuncular.sort((a,b) => b.score - a.score);
            
            oyuncular.forEach((p, index) => {
                let isWinner = index === 0 && p.score > 0 ? "winner" : "";
                let crown = index === 0 && p.score > 0 ? "👑 " : "";
                ul.innerHTML += `<li class="${isWinner}"><span>${crown}${p.name}</span><span class="score-val">${p.score} Pts</span></li>`;
            });
        });

        function nextQuestion() {
            playSound('click');
            socket.emit('sonraki-soru', currentRoomCode);
        }

        socket.on('oyun-bitti', (oyuncular) => {
            switchScreen('score-screen');
            playSound('finish'); // Zafer Sesi
            document.getElementById('score-title').innerText = "🏁 Oyun Bitti! Final Sonuçları";
            document.getElementById('next-question-btn').style.display = 'none';
            document.getElementById('return-home-btn').style.display = 'block';
            
            const ul = document.getElementById('scores-ul');
            ul.innerHTML = "";
            oyuncular.sort((a,b) => b.score - a.score);
            
            oyuncular.forEach((p, index) => {
                let isWinner = index === 0 ? "winner" : "";
                let medal = index === 0 ? "🏆 MVP " : (index === 1 ? "🥈 " : (index === 2 ? "🥉 " : ""));
                ul.innerHTML += `<li class="${isWinner}"><span>${medal}${p.name}</span><span class="score-val">${p.score} Pts</span></li>`;
            });
        });

        socket.on('hata', (msg) => { alert(msg); });
        
        window.onload = function() {
            fetch('/api/ayarlar').then(res => res.json()).then(data => {
                document.body.style.backgroundColor = data.renk;
                document.getElementById('siteLogo').innerText = data.isim;
                document.getElementById("username-input").focus();
            });
        };
    </script>
</body>
</html>
