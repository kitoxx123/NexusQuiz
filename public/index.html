<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusQuiz - Canlı Oyun Ekranı</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: white; transition: background 0.5s; margin:0; padding:20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .logo { font-size: 24px; font-weight: bold; color: #66fcf1; }
        
        .setup-container { max-width: 500px; margin: 40px auto; background: #1f2833; padding: 30px; border-radius: 12px; border: 1px solid #45f3ff; text-align: center; }
        input, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #45f3ff; background: #0b0c10; color: white; box-sizing: border-box; }
        button { background: #66fcf1; color: #0b0c10; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #45f3ff; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1f2833; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #45f3ff; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #45f3ff; color: #0b0c10; font-weight: bold; transform: translateY(-3px); }
        
        .lobby-container { display: none; max-width: 600px; margin: 40px auto; background: #1f2833; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #66fcf1; }
        .room-code { font-size: 32px; color: #66fcf1; font-weight: bold; letter-spacing: 2px; margin: 15px 0; }
        .player-list { list-style: none; padding: 0; margin: 20px 0; text-align: left; background: #0b0c10; border-radius: 6px; padding: 10px; }
        .player-list li { padding: 8px; border-bottom: 1px solid #1f2833; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" id="siteLogo">NexusQuiz</div>
    <div id="statusLabel">🌐 Sunucu Bağlantısı Kuruluyor...</div>
</div>

<div class="setup-container" id="loginScreen">
    <h2>🎮 NexusQuiz'e Giriş</h2>
    <input type="text" id="usernameInput" placeholder="Kullanıcı adınızı yazın..." value="Oyuncu_1">
    <button onclick="kullaniciKaydet()">Devam Et ➔</button>
</div>

<div id="categoryScreen" style="display: none; max-width: 900px; margin: 0 auto; margin-top: 30px;">
    <h2>Test Kategorisini Seçin ve Odayı Kurun</h2>
    <div class="grid-container" id="kategoriListesi">
        </div>
</div>

<div class="lobby-container" id="lobbyScreen">
    <h2 id="lobbyTitle">Lobi Odası</h2>
    <p>Arkadaşlarınızın katılması için oda kodu:</p>
    <div class="room-code" id="codeDisplay">0000</div>
    
    <h3>İçerideki Oyuncular:</h3>
    <ul class="player-list" id="playerList">
        </ul>
    
    <button id="startBtn" onclick="oyunuBaslat()" style="background: #45f3ff;">Oyunu Başlat 🚀</button>
</div>

<script>
    const socket = io();
    let benimKullaniciAdim = "";
    let mevcutOdaKodu = "";

    // Soket bağlandığında durumu güncelle
    socket.on('connect', () => {
        document.getElementById('statusLabel').innerText = "🟢 Sunucuya Bağlandı";
    });

    // Sunucudan ayarları ve kategorileri canlı olarak çeken fonksiyon
    function ayarlariVeKategorileriYukle() {
        fetch('/api/ayarlar')
            .then(res => res.json())
            .then(data => {
                document.body.style.backgroundColor = data.renk;
                document.getElementById('siteLogo').innerText = data.isim;
                
                const liste = document.getElementById('kategoriListesi');
                liste.innerHTML = "";
                data.kategoriler.forEach(k => {
                    liste.innerHTML += `
                        <div class="card" onclick="odaOlustur('${k.id}', '${k.name}')">
                            <h3>${k.name}</h3>
                            <p>Oda Oluştur ve Başlat ➔</p>
                        </div>
                    `;
                });
            });
    }

    // İlk adım: Kullanıcı adını kaydet ve kategorileri göster
    function kullaniciKaydet() {
        const input = document.getElementById('usernameInput').value;
        if (!input.trim()) return alert("Lütfen geçerli bir isim yazın!");
        benimKullaniciAdim = input;
        
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('categoryScreen').style.display = "block";
        ayarlariVeKategorileriYukle();
    }

    // İkinci adım: Gerçekten soket üzerinden oda oluşturma tetikleyicisi
    function odaOlustur(kategoriId, kategoriAdi) {
        socket.emit('oda-olustur', { username: benimKullaniciAdim, secilenTest: kategoriId });
    }

    // Üçüncü adım: Sunucu odayı oluşturunca lobiye geçiş
    socket.on('oda-olusturuldu', (data) => {
        mevcutOdaKodu = data.odaKodu;
        document.getElementById('categoryScreen').style.display = "none";
        document.getElementById('lobbyScreen').style.display = "block";
        document.getElementById('codeDisplay').innerText = data.odaKodu;
        document.getElementById('lobbyTitle').innerText = "Lobi - " + data.testAdi.toUpperCase();
        
        // Oyuncu listesini güncelle
        oyuncuListesiniYaz(data.oyuncular);
    });

    // Lobideki oyuncu listesini güncel tutan soket dinleyicisi
    socket.on('oyuncu-listesi', (oyuncular) => {
        oyuncuListesiniYaz(oyuncular);
    });

    function oyuncuListesiniYaz(oyuncular) {
        const pList = document.getElementById('playerList');
        pList.innerHTML = "";
        oyuncular.forEach(p => {
            pList.innerHTML += `<li>👑 ${p.name} ${p.id === socket.id ? '(Siz)' : ''}</li>`;
        });
    }

    function oyunuBaslat() {
        if (!mevcutOdaKodu) return;
        socket.emit('oyunu-baslat', mevcutOdaKodu);
        alert("Oyun sunucu tarafından tetiklendi! Soru ekranı yüklenecek.");
        // Buradan sonra senin mevcut oyun ekranı/soru ekranı geçiş fonksiyonun çalışır
    }
</script>
</body>
</html>
